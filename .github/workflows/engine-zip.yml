name: engine zip

# Builds mojo-backend.zip — the engine source bundle the Millrace menu app
# (millrace/app) downloads, then `mojo build`s on-device. See scripts/package_engine.sh.
on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write # to attach the zip to a Release on tags

jobs:
  zip:
    runs-on: macos-14
    steps:
      # Lay the three repos out as siblings, matching the dev layout the pixi
      # `flare-tls` task and the package script assume (../minja2, ../flare).
      - uses: actions/checkout@v4
        with:
          path: mojo-backend
      - uses: actions/checkout@v4
        with:
          repository: millrace/minja2
          path: minja2
      - uses: actions/checkout@v4
        with:
          repository: millrace/flare
          path: flare

      - uses: prefix-dev/setup-pixi@v0.8.10
        with:
          manifest-path: mojo-backend/pixi.toml

      - name: Build libflare_tls.so
        working-directory: mojo-backend
        run: pixi run flare-tls

      - name: Package mojo-backend.zip
        working-directory: mojo-backend
        run: pixi run bash scripts/package_engine.sh "$GITHUB_WORKSPACE/mojo-backend.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: mojo-backend-zip
          path: mojo-backend.zip
          if-no-files-found: error

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: mojo-backend.zip
