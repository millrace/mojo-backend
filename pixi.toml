[workspace]
name = "mojo-backend"
version = "0.1.0"
authors = ["Marius S <marius@seritan.net>"]
description = "Native-Mojo GPU re-implementation of millrace inference: a hardcoded Qwen2.5-0.5B-Instruct forward pass on Apple Silicon (Metal). See ARCHITECTURE.md."
# Nightly Mojo: we need the current std.gpu / TileTensor GPU API (per the
# modular `mojo-gpu-fundamentals` skill). No flare/MAX runtime dep yet — the
# engine is pure Mojo (ARCHITECTURE.md §1, §8); serving is Phase 6.
channels = [
    "https://conda.modular.com/max-nightly",
    "conda-forge",
]
platforms = ["osx-arm64"]

[dependencies]
mojo = "*"

# The conformance oracle (ARCHITECTURE.md §7) — a SEPARATE environment so the
# default build stays Mojo-only and fast. transformers/torch on CPU/f32 is the
# trusted reference (the §7 "transformers-equivalent" oracle); we capture real
# Qwen2 attention internals from it via forward hooks, which MAX's compiled graph
# does not expose. The default feature (mojo) is auto-included in every env, so
# the `oracle` env has both Python and Mojo.
[feature.oracle.dependencies]
python = ">=3.11"
numpy = "*"
pytorch = "*"
transformers = "*"
safetensors = "*"
huggingface_hub = "*"

[environments]
oracle = ["oracle"]

[tasks]
# Phase 0 go/no-go: confirm a hand-written Mojo Metal kernel runs and computes
# correctly on this M4 (re-confirms max-backend §8 #2 rung 1) before betting the
# project on the GPU-only path. Exits non-zero on any mismatch / no accelerator.
gpu-hello = "mojo run src/gpu_hello.mojo"
build-gpu-hello = "mkdir -p build && mojo build src/gpu_hello.mojo -o build/gpu_hello"

# Verification gates. Each test_*.mojo drives the src/ library (kernels.mojo,
# model.mojo, tokenizer.mojo) against fixtures and exits non-zero on mismatch;
# the matching *-capture task (oracle env) regenerates the fixtures from HF/torch.

# Phase 1 (ARCHITECTURE.md §6, §11 #1): RoPE + causal GQA attention — the kernel
# MAX got wrong on Metal — vs the NumPy reference.
test-attention = "mojo run src/test_attention.mojo"

# Phase 2 (§3, §11 #4): matmul+bias, RMSNorm, SwiGLU vs NumPy.
test-kernels = "mojo run src/test_kernels.mojo"

# simdgroup-matrix prefill GEMM (matmul_simd_kernel) vs the scalar tiled GEMM,
# across sizes incl. boundaries, plus the runtime capability probe. Needs the
# Metal GPU; no fixtures.
test-simd-gemm = "mojo run src/test_simd_gemm.mojo"

# Phase 2 (§5.1, §11 #5): safetensors parse + bf16→f32 vs torch. Needs loader-capture.
test-loader = "mojo run src/test_loader.mojo"

# Phase 2 (§5.2, §11 #6): byte-level BPE encode/decode vs transformers. Needs tok-capture.
test-tokenizer = "mojo run src/test_tokenizer.mojo"

# Phase 3 (§6, §11 #7): full forward pass vs HF per-layer + argmax. Built (not
# `run`) for compiled-speed weight loading. Needs forward-capture.
test-forward = { cmd = "mkdir -p build && mojo build src/test_forward.mojo -o build/test_forward && ./build/test_forward" }

# Phase 4 (§5.4–5.5, §11 #8): greedy decode + KV cache, token-for-token vs HF.
# Needs generate-capture.
test-generate = { cmd = "mkdir -p build && mojo build src/test_generate.mojo -o build/test_generate && ./build/test_generate" }

# Phase 5 (§5.6, §11 #9): sampling pipeline (rep-penalty/temp/top-k/top-p)
# distribution vs HF's logits processors. Needs sample-capture.
test-sample = "mojo run src/test_sample.mojo"

# Phase 6b tool-calling: parse the model's <tool_call> blocks into structured
# calls (src/toolcall.mojo). Pure CPU + JSON, no GPU/fixtures. -I ../minja2/src
# for the JSON parser/serializer.
test-toolcall = "mojo run -I ../minja2/src src/test_toolcall.mojo"

# Disk block KV-cache roundtrip (src/blockcache.mojo): store -> corrupt -> restore
# bit-identical, chained-hash determinism, collision guard. Needs the GPU.
test-blockcache = "mojo run src/test_blockcache.mojo"

# Manual GPU gate: greedy-parity of the simdgroup-matrix prefill GEMM — generate
# the same prompt with the scalar vs simd GEMM and assert identical tokens. Needs
# weights + Metal GPU. Usage: pixi run simd-parity [-- "prompt"].
simd-parity = { cmd = "mojo build tests/manual/simd_parity.mojo -I src -I ../minja2/src -o build/simd_parity && ./build/simd_parity" }

# int8 quantization eval (shelved investigation, kept for repro). int8-quality:
# per-channel int8 RTN fake-quant vs bf16 — recon error, teacher-forced top-1 +
# KL drift, greedy divergence. Needs weights + GPU. int8-gemv-bench: int8 (naive
# + vectorized int8x4) vs bf16 decode GEMV bandwidth; GPU only, no weights.
int8-quality = { cmd = "mkdir -p build && mojo build tests/manual/int8_quality.mojo -I src -I ../minja2/src -o build/int8_quality && ./build/int8_quality" }
int8-gemv-bench = { cmd = "mkdir -p build && mojo build tests/manual/int8_gemv_bench.mojo -I src -o build/int8_gemv_bench && ./build/int8_gemv_bench" }

# Phase 6a end-to-end chat CLI (ARCHITECTURE.md §6): prompt -> text, pure Mojo on
# the GPU. Usage: pixi run chat -- "Your question". Needs tok-capture (tokenizer
# tables) + a checkpoint path ($QWEN_SAFETENSORS or forward-capture's meta).
chat = { cmd = "mkdir -p build && mojo build src/main.mojo -I ../minja2/src -o build/chat && ./build/chat" }

# Phase 6b OpenAI-compatible HTTP server, pure Mojo on the GPU over flare.
# Listens on 127.0.0.1:8000. -I ../minja2/src: chat templating (§5.3). -I ../flare:
# the kqueue reactor / Router / SSE, reused from max-backend (§11 #11 — the fork
# now builds under 1.0.0b2). flare-tls builds libflare_tls.so (raw socket I/O +
# TLS FFI) from the fork's own C++ source against the env's OpenSSL. flare's
# find_flare_lib dlopens it from $CONDA_PREFIX/lib/ at runtime (its canonical
# install location when CONDA_PREFIX is set, as it is under pixi), so build there.
flare-tls = { cmd = "clang++ -O2 -std=c++17 -fPIC -DNDEBUG -shared -o $CONDA_PREFIX/lib/libflare_tls.so ../flare/flare/tls/ffi/openssl_wrapper.cpp -I$CONDA_PREFIX/include -L$CONDA_PREFIX/lib -lssl -lcrypto -Wl,-rpath,$CONDA_PREFIX/lib" }
# Default serves Qwen2.5-0.5B (from meta.txt). To serve another downloaded model,
# pass its HF id (resolved from the local cache) or a checkpoint path:
#   pixi run serve -- Qwen/Qwen2.5-3B-Instruct
# The server reports the served model at /v1/models.
serve = { cmd = "mkdir -p build && mojo build src/server.mojo -I ../minja2/src -I ../flare -o build/server && ./build/server", depends-on = ["flare-tls"] }

# Launch opencode pointed at the running service. Start `pixi run serve` (in another
# terminal) first. opencode_config.py queries the server's /v1/models and writes a
# matching opencode config (so the picker shows exactly what's served — whatever
# `serve` was launched with), then opencode is pointed at it via OPENCODE_CONFIG.
# Usage: pixi run opencode  (interactive)  or  pixi run opencode -- run "prompt".
opencode = { cmd = "CFG=$(python3 $PIXI_PROJECT_ROOT/opencode_config.py http://127.0.0.1:8000/v1) && OPENCODE_CONFIG=$CFG OPENAI_BASE_URL=http://127.0.0.1:8000/v1 OPENAI_API_KEY=millrace opencode" }

[feature.oracle.tasks]
# Download a HF model's weights (safetensors + metadata only) into the local cache
# and print the snapshot dir — drop it into tests/fixtures/forward/meta.txt line 2.
# The loader auto-detects single-file vs sharded / 0.5B vs 3B. Usage:
#   pixi run -e oracle download-model -- Qwen/Qwen2.5-3B-Instruct
download-model = "python tests/manual/download_model.py"
# List cached models that have real safetensors weights and flag which `serve`
# accepts (hidden 896 -> 0.5B, 2048 -> 3B). Usage: pixi run -e oracle list-models
list-models = "python tests/manual/list_models.py"
# Generates tests/fixtures/attention/{synthetic,real_L0,real_L23}/ : q/k/v.bin,
# expected.bin (NumPy ref), meta.txt. Also asserts NumPy ref ≈ HF context.
attn-capture = "python tests/manual/attention_spike/capture.py"
# Generates tests/fixtures/kernels/{syn,real}_{rmsnorm,matmul,swiglu}/ and
# cross-checks each NumPy reference against HF on real layer-0 activations.
kernels-capture = "python tests/manual/kernels_spike/capture.py"
# Dumps the real checkpoint path + expected first-8 values per tensor.
loader-capture = "python tests/manual/loader_spike/capture.py"
# Dumps vocab/merges resolved to ids + expected encodings for the prompt corpus.
tok-capture = "python tests/manual/tokenizer_spike/capture.py"
# Dumps ids + per-layer hidden states + last-position logits from HF (CPU/f32).
forward-capture = "python tests/manual/forward_spike/capture.py"
# Dumps prompt ids + HF greedy continuation token ids.
generate-capture = "python tests/manual/generate_spike/capture.py"
# Dumps raw logits + context + HF's processed (id,prob) distribution.
sample-capture = "python tests/manual/sample_spike/capture.py"
